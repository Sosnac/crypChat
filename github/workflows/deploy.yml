name: crypChat Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Security Tests
        run: npm test

      - name: Deploy to Server
        run: |
          # This command triggers your server provider's CLI to update
          railway up --detach 
          
